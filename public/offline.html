<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RestaurantOS — offline</title>
  <style>
    body { margin:0; height:100vh; display:flex; align-items:center; justify-content:center; background:#0F1117; color:#E8ECF0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
    .box { text-align:center; padding:24px; }
    .dot { width:56px; height:56px; border-radius:16px; background:#E8B923; margin:0 auto 16px; }
    h1 { font-size:20px; margin:0 0 8px; }
    p { color:#6B7A8D; font-size:14px; margin:0 0 16px; }
    button { background:#E8B923; color:#0F1117; border:0; border-radius:10px; padding:10px 18px; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>
  <div class="box">
    <div class="dot"></div>
    <h1>Brak połączenia</h1>
    <p>RestaurantOS wymaga internetu do pokazania bieżących danych.</p>
    <button onclick="location.reload()">Spróbuj ponownie</button>
  </div>
</body>
</html>
